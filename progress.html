<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f3f4f7">
<title>Progress · Recomp Block</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f3f4f7; --panel:#ffffff; --panel2:#eceef2; --line:#e1e4ea;
  --ink:#1b1e25; --mut:#697080; --faint:#9aa1ad;
  --acc:#0e9d6c; --accdim:rgba(14,157,108,.24);
  --lower:#bf7016; --upper:#2d77c7; --sprint:#d83a3a; --vo2:#7b46d4; --endur:#0e8f63; --z2:#0c8c9c;
  --disp:'Space Grotesk',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg); color:var(--ink); font-family:var(--disp); -webkit-font-smoothing:antialiased;
  line-height:1.45; padding:env(safe-area-inset-top) 0 calc(40px + env(safe-area-inset-bottom)); max-width:760px; margin:0 auto;}
h1,h2,h3{margin:0; font-weight:600}
a{color:var(--acc)}
header{position:sticky; top:0; z-index:30; background:rgba(243,244,247,.86); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line); padding:14px 18px 12px;}
.htop{display:flex; align-items:baseline; justify-content:space-between; gap:10px}
.brand{font-weight:700; font-size:18px; letter-spacing:-.01em}
.brand small{display:block; font-weight:400; font-size:11px; color:var(--mut); letter-spacing:.14em; text-transform:uppercase; margin-top:2px}
.back{font-family:var(--mono); font-size:12px; color:var(--mut); text-decoration:none; border:1px solid var(--line);
  border-radius:8px; padding:5px 10px; background:var(--panel2)}
.back:hover{color:var(--ink)}
.sec{padding:18px 16px 4px}
.eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint);
  display:flex; align-items:center; gap:8px; margin:0 2px 12px}
.eyebrow::after{content:''; flex:1; height:1px; background:var(--line)}
.card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:14px;
  box-shadow:0 1px 2px rgba(20,24,34,.05),0 4px 14px rgba(20,24,34,.04)}
.chips{display:flex; gap:7px; flex-wrap:wrap; margin:0 2px 14px}
.chip{font-family:var(--mono); font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:var(--mut);
  border:1px solid var(--line); border-radius:99px; padding:6px 13px; background:var(--panel); cursor:pointer}
.chip:hover{border-color:var(--accdim)}
.chip.on{color:#fff; background:var(--acc); border-color:var(--acc)}
.chip.on.c-lower{background:var(--lower); border-color:var(--lower)}
.chip.on.c-upper{background:var(--upper); border-color:var(--upper)}
.chip.on.c-sprint{background:var(--sprint); border-color:var(--sprint)}
.chip.on.c-vo2{background:var(--vo2); border-color:var(--vo2)}
.chip.on.c-endurance{background:var(--endur); border-color:var(--endur)}
.selrow{display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap}
select{font-family:var(--mono); font-size:13px; padding:8px 10px; border:1px solid var(--line); border-radius:9px;
  background:var(--panel2); color:var(--ink); max-width:100%}
.metricbadge{font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--mut);
  background:var(--panel2); border:1px solid var(--line); border-radius:99px; padding:3px 9px}
.chartwrap{position:relative; height:250px}
.stat{display:flex; gap:18px; flex-wrap:wrap; margin:10px 0 2px}
.stat .s{font-family:var(--mono); font-size:12px; color:var(--mut)}
.stat .s b{color:var(--ink); font-weight:600; font-size:15px; display:block}
.empty{font-family:var(--mono); font-size:12px; color:var(--faint); padding:24px 4px; text-align:center}
.tbl{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:11.5px; margin-top:6px}
.tbl td,.tbl th{padding:5px 6px; border-bottom:1px solid var(--line); text-align:left; color:var(--mut)}
.tbl th{color:var(--faint); text-transform:uppercase; letter-spacing:.08em; font-size:9px; font-weight:500}
.tbl td.ex{color:var(--ink); font-weight:500}
.foot{text-align:center; color:var(--faint); font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; padding:22px 16px 4px}
.loading{font-family:var(--mono); font-size:12px; color:var(--mut); padding:30px; text-align:center}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div class="brand">Progress<small>Recomp Block · Jun–Aug</small></div>
    <a class="back" href="index.html">← Tracker</a>
  </div>
</header>

<div id="status" class="loading">Loading your log…</div>

<div class="sec" id="main" style="display:none">
  <div class="eyebrow">Performance over time</div>
  <div class="chips" id="chips"></div>
  <div class="card">
    <div class="selrow">
      <select id="exSel"></select>
      <span class="metricbadge" id="metricBadge"></span>
    </div>
    <div class="chartwrap"><canvas id="chart"></canvas></div>
    <div id="stat" class="stat"></div>
    <div id="chartEmpty" class="empty" style="display:none">No data for this selection yet.</div>
  </div>
</div>

<div class="sec" id="logSec" style="display:none">
  <div class="eyebrow">Recent entries</div>
  <div class="card">
    <table class="tbl" id="logTbl"><thead><tr><th>Date</th><th>Exercise</th><th>Set</th><th>Load</th><th>Reps</th><th>RIR</th><th>Notes</th></tr></thead><tbody></tbody></table>
    <div id="logEmpty" class="empty" style="display:none">No entries yet. Log some on the tracker.</div>
  </div>
</div>

<div class="foot" id="foot">reads your recomp-log Google Sheet + this device's entries</div>

<script>
"use strict";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyq0ZEWv8ZfkL8XhESm5gU7APsIVvm86VRGt8HFbTVepVQJEixQ4Lk_P9GGdEvodsw/exec";
const LOGKEY = "recomp-entries-2026";

/* rowing results — loaded live from sync/results.json (maintained by the daily Concept2 sync) */
let ROWS = [];
function rowCat(band){
  // classify by the band's fast end: sprints are fastest, then VO2, else threshold/endurance
  const m = String(band||"").match(/(\d+):(\d+(?:\.\d+)?)/);
  if(!m) return "test";
  const fast = (+m[1])*60 + (+m[2]);
  if(fast < 112) return "sprint";       // < 1:52
  if(fast < 123.5) return "vo2";        // < 2:03.5
  return "endurance";
}
function loadRowing(){
  return fetch("sync/results.json?_="+Date.now())
    .then(r=>r.json())
    .then(j=>{ ROWS = Object.entries(j).map(([date,v])=>({
        date, cat: rowCat(v.band), pace: v.pace, band: v.band, verdict: v.verdict,
        dist: v.dist, note: v.note, link: v.link })); })
    .catch(e=>{ ROWS = []; });
}

function paceToSec(p){ if(!p) return null; const m=String(p).match(/(\d+):(\d+(?:\.\d+)?)/); return m?(+m[1])*60+(+m[2]):null; }
function secToPace(v){ const m=Math.floor(v/60),s=Math.round((v-m*60)*10)/10; return m+":"+(s<10?"0":"")+s.toFixed(1); }
function localEntries(){ try{ return JSON.parse(localStorage.getItem(LOGKEY))||[]; }catch(e){ return []; } }
function parseLoad(w){ if(w==null||w==="") return null; const m=String(w).match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):null; }
function esc(s){ return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function normalizeSheet(rows){
  if(!rows||!rows.length) return [];
  const head=rows[0].map(h=>String(h).trim()); const idx=n=>head.indexOf(n);
  return rows.slice(1).map(r=>({
    ts:r[idx("timestamp")]||"", date:String(r[idx("date")]||"").slice(0,10), day_type:r[idx("day_type")]||"",
    exercise:r[idx("exercise")]||"", prescribed:r[idx("prescribed")]||"", set_num:r[idx("set_num")]||"",
    reps:r[idx("reps")]||"", weight:r[idx("weight")]||"", rir_rpe:r[idx("rir_rpe")]||"", notes:r[idx("notes")]||"", source:r[idx("source")]||""
  })).filter(e=>e.exercise && e.source!=="seed" && e.day_type!=="test");
}
function mergeEntries(sheetRows){
  const a=normalizeSheet(sheetRows);
  const local=localEntries().map(e=>Object.assign({date:String(e.date||"").slice(0,10)},e));
  const seen=new Set(); const out=[];
  [...a,...local].forEach(e=>{ const k=[e.date,e.exercise,e.set_num,e.weight,e.reps,e.notes].join("|");
    if(!seen.has(k)){ seen.add(k); out.push(e); } });
  return out;
}

let ENTRIES=[]; let CHART=null;
const CATS=[
  {id:"all",label:"All"},
  {id:"lower",label:"Lower"},
  {id:"upper",label:"Upper"},
  {id:"sprint",label:"Sprint"},
  {id:"vo2",label:"VO₂"},
  {id:"endurance",label:"Endurance"}
];
let activeCat="all";

// strength exercises grouped by day_type (upper/lower) from real entries
function strengthByCat(cat){
  const ex=ENTRIES.filter(e=>e.exercise!=="(free note)" && (e.weight||e.reps) );
  let f=ex;
  if(cat==="lower") f=ex.filter(e=>e.day_type==="lower");
  else if(cat==="upper") f=ex.filter(e=>e.day_type==="upper");
  else if(cat==="all") f=ex;
  else return []; // rowing cats -> no strength
  return [...new Set(f.map(e=>e.exercise))].sort();
}
function rowingExercises(cat){
  // distinct rowing "sessions" grouped by category; we treat each cat as one selectable series
  const cats = cat==="all" ? ["sprint","vo2","endurance"] : (["sprint","vo2","endurance"].includes(cat)?[cat]:[]);
  return cats.map(c=>"Rowing · "+({sprint:"Sprint",vo2:"VO₂",endurance:"Endurance"}[c]));
}

function exercisesForCat(cat){
  if(["sprint","vo2","endurance"].includes(cat)) return rowingExercises(cat);
  // all / upper / lower -> strength; for 'all' also append rowing series
  let list=strengthByCat(cat);
  if(cat==="all") list=list.concat(rowingExercises("all"));
  return list;
}

function renderChips(){
  const el=document.getElementById("chips");
  el.innerHTML=CATS.map(c=>'<button class="chip c-'+c.id+(c.id===activeCat?" on":"")+'" data-cat="'+c.id+'">'+c.label+'</button>').join("");
  el.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{ activeCat=b.dataset.cat; renderChips(); fillExercises(); });
}
function fillExercises(){
  const list=exercisesForCat(activeCat);
  const sel=document.getElementById("exSel");
  if(!list.length){ sel.innerHTML='<option>— none in this category —</option>'; drawEmpty(); return; }
  sel.innerHTML=list.map(n=>'<option>'+esc(n)+'</option>').join("");
  sel.onchange=()=>draw(sel.value);
  draw(list[0]);
}
function drawEmpty(){ if(CHART) CHART.destroy(); document.getElementById("chartEmpty").style.display=""; document.getElementById("stat").innerHTML=""; document.getElementById("metricBadge").textContent=""; }

function draw(name){
  document.getElementById("chartEmpty").style.display="none";
  if(String(name).indexOf("Rowing · ")===0){ drawRowing(name); return; }
  // strength: top weight per session (by date+ts)
  const rows=ENTRIES.filter(e=>e.exercise===name && parseLoad(e.weight)!=null);
  // group by date, take max load that day (handles building sets)
  const byDate={};
  rows.forEach(e=>{ const d=e.date; const w=parseLoad(e.weight); if(!byDate[d]||w>byDate[d]) byDate[d]=w; });
  const dates=Object.keys(byDate).sort();
  const data=dates.map(d=>byDate[d]);
  document.getElementById("metricBadge").textContent="load (lb)";
  if(!dates.length){ drawEmpty(); return; }
  paint(name, dates, data, "#0e9d6c", false, v=>v+" lb");
  const first=data[0], last=data[data.length-1], delta=Math.round((last-first)*10)/10;
  document.getElementById("stat").innerHTML=
    '<div class="s">sessions<b>'+dates.length+'</b></div>'
   +'<div class="s">latest<b>'+last+' lb</b></div>'
   +'<div class="s">change<b>'+(delta>=0?"+":"")+delta+' lb</b></div>';
}
function drawRowing(name){
  const cat={"Rowing · Sprint":"sprint","Rowing · VO₂":"vo2","Rowing · Endurance":"endurance"}[name];
  const rows=ROWS.filter(r=>r.cat===cat).sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById("metricBadge").textContent="work pace /500m";
  if(!rows.length){ drawEmpty(); return; }
  const dates=rows.map(r=>r.date);
  const data=rows.map(r=>paceToSec(r.pace));
  const colors=rows.map(r=> r.verdict==="in"?"#0e9d6c": r.verdict==="above"?"#7b46d4":"#d83a3a");
  paint(name, dates, data, colors, true, v=>secToPace(v)+" /500m");
  const last=rows[rows.length-1];
  const inZone=rows.filter(r=>r.verdict==="in"||r.verdict==="above").length;
  document.getElementById("stat").innerHTML=
    '<div class="s">sessions<b>'+rows.length+'</b></div>'
   +'<div class="s">latest<b>'+last.pace+'</b></div>'
   +'<div class="s">vs band<b>'+last.verdict+'</b></div>'
   +'<div class="s">hit target<b>'+inZone+'/'+rows.length+'</b></div>';
}
function paint(label, labels, data, color, reverseY, fmt){
  const ctx=document.getElementById("chart");
  if(CHART) CHART.destroy();
  const isBar=Array.isArray(color);
  CHART=new Chart(ctx,{ type:isBar?"bar":"line",
    data:{labels,datasets:[{label,data,
      borderColor:isBar?undefined:color, backgroundColor:isBar?color:"rgba(14,157,108,.12)",
      tension:.25, fill:!isBar, pointRadius:4, pointBackgroundColor:isBar?undefined:color}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>fmt(c.parsed.y)}}},
      scales:{y:{reverse:!!reverseY, ticks:{callback:v=> reverseY? secToPace(v):v }}}}});
}

function renderTable(){
  const tb=document.querySelector("#logTbl tbody");
  const rows=ENTRIES.filter(e=>e.ts||e.date).sort((a,b)=>(b.ts||b.date||"").localeCompare(a.ts||a.date||"")).slice(0,60);
  document.getElementById("logSec").style.display="";
  if(!rows.length){ document.getElementById("logEmpty").style.display=""; document.getElementById("logTbl").style.display="none"; return; }
  tb.innerHTML=rows.map(e=>'<tr><td>'+(e.date||"")+'</td><td class="ex">'+esc(e.exercise)+'</td><td>'+esc(e.set_num)+'</td><td>'+esc(e.weight)+'</td><td>'+esc(e.reps)+'</td><td>'+esc(e.rir_rpe)+'</td><td>'+esc(e.notes)+'</td></tr>').join("");
}

function renderAll(){
  document.getElementById("status").style.display="none";
  document.getElementById("main").style.display="";
  renderChips(); fillExercises(); renderTable();
}

/* JSONP read with local fallback */
function load(){
  let done=false;
  window.__recompCb=function(rows){ done=true; try{ ENTRIES=mergeEntries(rows); }catch(e){ ENTRIES=mergeEntries(null); } renderAll(); };
  const s=document.createElement("script");
  s.src=GAS_URL+"?callback=__recompCb&_="+Date.now();
  s.onerror=function(){ if(!done){ ENTRIES=mergeEntries(null); document.getElementById("foot").textContent="couldn't reach Sheet — showing this device's entries only"; renderAll(); } };
  document.body.appendChild(s);
  setTimeout(()=>{ if(!done){ ENTRIES=mergeEntries(null); renderAll(); } }, 7000);
}
loadRowing().finally(load);
</script>
</body>
</html>
