name: Concept2 logbook sync

on:
  schedule:
    - cron: "0 13 * * *"   # 9:00am US Eastern (EDT); becomes 8:00am after the November DST change
  workflow_dispatch:
    inputs:
      debug:
        description: "Verbose page dump for parser debugging"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: c2sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync logbook
        run: |
          if [ "${{ inputs.debug }}" = "true" ]; then
            python sync/sync_c2.py --debug
          else
            python sync/sync_c2.py
          fi

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
          else
            git config user.name "c2-sync-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html sync/results.json
            git commit -m "Daily logbook sync: refresh Concept2 results"
            git push
          fi
